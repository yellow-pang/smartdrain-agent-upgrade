services:
  backend:
    volumes:
      - ./:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/backend"]

  ai-service:
    volumes:
      - ./:/app
      - ./mock_data/ai_image_samples:/app/mock_data/ai_image_samples:ro
    command: ["uvicorn", "ai_service.http.app:app", "--host", "0.0.0.0", "--port", "9000", "--reload", "--reload-dir", "/app/ai_service"]

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["pnpm", "dev", "--hostname", "0.0.0.0"]
    environment:
      COMPOSE_FRONTEND_API_BASE_URL: ${COMPOSE_FRONTEND_API_BASE_URL-}
      COMPOSE_FRONTEND_KAKAO_MAP_APP_KEY: ${COMPOSE_FRONTEND_KAKAO_MAP_APP_KEY:-}

  nginx:
    ports: !override
      - "${NGINX_DEV_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
