services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartdrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartdrain123}
      POSTGRES_DB: ${POSTGRES_DB:-smartdrain_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartdrain} -d ${POSTGRES_DB:-smartdrain_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  migrate:
    image: ${COMPOSE_PROJECT_NAME:-smartdrain}-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://smartdrain:smartdrain123@db:5432/smartdrain_db}
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend:
    image: ${COMPOSE_PROJECT_NAME:-smartdrain}-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://smartdrain:smartdrain123@db:5432/smartdrain_db}
      CORS_ORIGINS: '${COMPOSE_CORS_ORIGINS:-["http://localhost","http://localhost:8080"]}'
      AI_SERVER_BASE_URL: http://ai-service:9000
      AI_CALLBACK_BASE_URL: http://backend:8000
      AI_SERVER_TIMEOUT_SECONDS: ${COMPOSE_AI_SERVER_TIMEOUT_SECONDS:-10}
      AI_SERVER_ENABLED: ${COMPOSE_AI_SERVER_ENABLED:-true}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ai_service/Dockerfile
    environment:
      BACKEND_BASE_URL: http://backend:8000
      BACKEND_CALLBACK_TIMEOUT_SECONDS: ${COMPOSE_BACKEND_CALLBACK_TIMEOUT_SECONDS:-10}
      BACKEND_CALLBACK_RETRY_COUNT: ${COMPOSE_BACKEND_CALLBACK_RETRY_COUNT:-1}
    volumes:
      - ${SMARTDRAIN_YOLO_MODEL_PATH:-./ai_service/model/best.pt}:/app/ai_service/model/best.pt:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:9000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        COMPOSE_FRONTEND_API_BASE_URL: ${COMPOSE_FRONTEND_API_BASE_URL-}
        COMPOSE_FRONTEND_KAKAO_MAP_APP_KEY: ${COMPOSE_FRONTEND_KAKAO_MAP_APP_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.28-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  seed:
    profiles: ["seed"]
    image: ${COMPOSE_PROJECT_NAME:-smartdrain}-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://smartdrain:smartdrain123@db:5432/smartdrain_db}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.seeds.seed_mock_data"]
    restart: "no"

volumes:
  postgres_data:
  frontend_node_modules:
